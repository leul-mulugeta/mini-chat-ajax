<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>Messagerie Instantanée</title>
        <link rel="stylesheet" href="css/style.css" />
        <script defer src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script defer src="script.js"></script>
    </head>

    <body>
        <label for="pseudo">Mon Pseudo</label>
        <input type="text" id="pseudo" name="pseudo" maxlength="20" />
        <div id="historique"></div>
        <input
            type="text"
            id="message"
            name="message"
            placeholder="Saisissez votre message"
            autocomplete="off"
            maxlength="3000"
        />
        <button type="button" id="btn-enregistrer" onclick="enregistrer()">Envoyer</button>
    </body>
</html>
